<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow - Perfil</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="shortcut icon" href="../assets/icon/favicon.svg" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<section>
    <div class="perfil">
        <header>
            <div class="topo">
                <div class="logo">
                    <img src="../assets/icon/studyflow.svg" alt="Logo">
                    <h2>StudyFlow</h2>
                </div>

                <div class="user">
                    <p id="nomeUsuario">Olá, Usuario</p>
                </div>
            </div>

            <div class="nav">
                <ul>
                    <li class="agora"><a href="perfil.html">Perfil</a></li>
                    <li><a href="dashboard.html">Painel</a></li>
                </ul>
            </div>

            <a href="../login.html">Sair</a>
        </header> 

        <div class="perfil-container">
            <div class="title">
                <h3>Altere as suas informações</h3>
            </div>   

            <div class="login">
                <div class="container">
                    <div class="card card-cadastro">
                        <h2>Meu Perfil</h2>
                        <div class="formulario">
                        <div class="campo">
                            <p>Nome:</p>
                            <input id="nome_input" type="text" placeholder="Seu nome" />
                        </div>
                        <div class="campo">
                            <p>E-mail:</p>
                            <input id="email_input" type="text" placeholder="meuemail@gmail.com" />
                        </div>
                        <div class="campo">
                            <p>Senha:</p>
                            <input id="senha_input" type="password" placeholder="******" />
                        </div>

                        <button class="botao" onclick="salvar()">Salvar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>

<script>

    // Executa funções iniciais após o carregamento completo da página
    window.addEventListener("load", () => {
    carregarUsuario();  // Chama a função que carrega os dados do usuário na tela
    });

    // Função responsável por carregar o nome do usuário na tela
    function carregarUsuario() {
        // Recupera o nome do usuário armazenado no sessionStorage
        let nome = sessionStorage.getItem("NOME_USUARIO");

        // Verifica se existe um nome salvo (evita erro ou exibição vazia)
        if (nome) {

            // Seleciona o elemento HTML com id "nomeUsuario"
            // e insere um texto com o nome do usuário em destaque (negrito)
            document.getElementById("nomeUsuario").innerHTML = 
                `Olá, <br> <strong>${nome}</strong>`;
        }
    }

    // Função responsável por atualizar os dados do usuário
    function salvar() {

    const nome = document.getElementById("nome_input").value;
    const email = document.getElementById("email_input").value;
    const senha = document.getElementById("senha_input").value;
    const idUsuario = sessionStorage.getItem("ID_USUARIO");

    // Objeto vazio que vai receber só os campos preenchidos
    let dados = {
        idUsuario
    };

    // Só adiciona se tiver valor
    if (nome) dados.nome = nome;
    if (email) dados.email = email;
    if (senha) dados.senha = senha;

    fetch("/usuarios/atualizar", {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(dados)
    })
    .then(res => {
        if (res.ok) {

            // Atualiza nome no sistema só se tiver mudado
            if (nome) {
                sessionStorage.setItem("NOME_USUARIO", nome);
                carregarUsuario(); // atualiza o nome do usuário na tela na hora
            }

            alert("Dados atualizados com sucesso!");

            // Limpa os Inputs
            document.getElementById("nome_input").value = "";
            document.getElementById("email_input").value = "";
            document.getElementById("senha_input").value = "";

        } else {
            throw new Error("Erro ao atualizar");
        }
    })
    .catch(err => {
        console.error(err);
        alert("Erro ao salvar alterações");
    });
}
</script>
