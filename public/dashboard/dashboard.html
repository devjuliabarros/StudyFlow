<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow - Painel</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="shortcut icon" href="../assets/icon/favicon.svg" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <section>
    <div class="dashboard">
        <header>
            <div class="topo">
                <div class="logo">
                    <img src="../assets/icon/studyflow.svg" alt="Logo">
                    <h2>StudyFlow</h2>
                </div>

                <div class="user">
                    <p id="nomeUsuario">Olá, Usuario</p>
                </div>
            </div>

            <div class="nav">
                <ul>
                    <li><a href="#">Perfil</a></li>
                    <li class="agora"><a href="dashboard2.html">Painel</a></li>
                </ul>
            </div>

            <a href="../login.html">Sair</a>
        </header> 
        
        <div class="dashboard-container">
                <div class="left">
                    <div class="title">
                        <h3>Meu Painel</h3>
                    </div>
                    <div class="cards">
                    <div class="card">
                        <h4>Tarefas Pendentes</h4>
                        <p id="pendentesQtd">0</p>
                    </div>

                    <div class="card">
                        <h4>Tarefas em Andamento</h4>
                        <p id="andamentoQtd">0</p>
                    </div>

                    <div class="card">
                        <h4>Tarefas Concluídas</h4>
                        <p id="concluidasQtd">0</p>
                    </div>
                    </div>

                    <div class="middle">
                    <div class="to-do">
                        <h4>Tarefas do Dia</h4>
                        <div id="tarefasHoje"></div>
                    </div>

                    <div class="task-list">
                    <div class="top">
                        <h4>Minhas Tarefas</h4>
                            <button onclick="abrirModal()"> Adicionar
                        </button>
                    </div>

                        <div id="todasTarefas"></div>
                    </div>
                    </div>
                </div>

                <div class="right">
                    <div class="graphics">
                    <div class="graphic">
                        <h3>Tarefas por Semana</h3>
                        <canvas id="graficoSemana"></canvas>
                    </div>

                    <div class="graphic">
                        <h3>Tarefas por Mês</h3>
                        <canvas id="graficoMes"></canvas>
                    </div>
                </div>
                </div>
        </div>
    </div>

    <!-- Modal de Criar uma Nova Tarefa -->
    <div id="modalTarefa" class="modal">
        <div class="modal-content">
            <h3>Nova Tarefa</h3>

            <input type="text" id="inputNome" placeholder="Nome">
            <input type="text" id="inputDisciplina" placeholder="Disciplina">
            <input type="date" id="inputData">

            <div class="buttons">
            <button onclick="salvarTarefa()">Salvar</button>
            <button onclick="fecharModal()">Cancelar</button>
            </div>
        </div>
    </div>
</section>

</body>
</html>

<script>

    // Função responsável por obter o ID do usuário armazenado no navegador
    function getUsuario() {
    
    // Acessa o sessionStorage (armazenamento temporário do navegador)
    // e retorna o valor associado à chave "ID_USUARIO"
    // Esse valor normalmente foi salvo após o login do usuário

    return sessionStorage.getItem("ID_USUARIO");
}

    // Executa funções iniciais após o carregamento completo da página
    window.addEventListener("load", () => {
    carregarUsuario();  // Chama a função que carrega os dados do usuário na tela
    carregarTarefas();  // Chama a função que busca e exibe as tarefas do usuário
    carregarCards(); // Atualiza os cards (ex: quantidade de tarefas, status, etc.)
    carregarGraficoSemana(); // Carrega o gráfico com dados da semana
    carregarGraficoMes(); // Carrega o gráfico com dados do mês
});

    // Função responsável por carregar o nome do usuário na tela
    function carregarUsuario() {
        // Recupera o nome do usuário armazenado no sessionStorage
        let nome = sessionStorage.getItem("NOME_USUARIO");

        // Verifica se existe um nome salvo (evita erro ou exibição vazia)
        if (nome) {

            // Seleciona o elemento HTML com id "nomeUsuario"
            // e insere um texto com o nome do usuário em destaque (negrito)
            document.getElementById("nomeUsuario").innerHTML = 
                `Olá, <br> <strong>${nome}</strong>`;
        }
}

    // Função responsável por buscar e exibir as tarefas do usuário
    function carregarTarefas() {

        // Exibe no console o ID do usuário logado (debug)
        console.log("USUÁRIO LOGADO:", sessionStorage.getItem("ID_USUARIO"));

        // Recupera o ID do usuário armazenado na sessão
        let fkUsuario = sessionStorage.getItem("ID_USUARIO");

        // Faz uma requisição para o backend buscando as tarefas do usuário
        fetch(`/tarefas/listar/${fkUsuario}`)
            
            .then(res => {

                // Verifica se a resposta da requisição foi bem-sucedida
                if (!res.ok) throw new Error("Erro ao buscar tarefas");

                 // Converte a resposta para JSON
                return res.json();
            })

            .then(tarefas => {

                // Exibe no console as tarefas recebidas (debug)
                console.log("TAREFAS:", tarefas);

                // Pega a data de hoje no formato YYYY-MM-DD
                let hoje = new Date().toISOString().split("T")[0];

                // Pega a data de hoje no formato YYYY-MM-DD
                let divHoje = document.getElementById("tarefasHoje");
                let divTodas = document.getElementById("todasTarefas");

                 // Limpa o conteúdo atual antes de renderizar novamente
                divHoje.innerHTML = "";
                divTodas.innerHTML = "";

                // Percorre todas as tarefas recebidas
                tarefas.forEach(tarefa => {

                    // Formata a data da tarefa (ou define como "Sem data")
                    let dataFormatada = tarefa.data ? tarefa.data.split("T")[0] : "Sem data";

                    // Define o texto do botão com base no status
                    let acao = "";

                    // Normaliza o status (remove espaços e deixa minúsculo)
                    let status = (tarefa.status || "").trim().toLowerCase();

                    if (status === "pendente") {
                        acao = "➡️ Iniciar";
                    } 
                    else if (status === "andamento") {
                        acao = "✔ Concluir";
                    } 
                    else if (status === "concluido") {
                        acao = "🔄 Reabrir";
                    }

                    // Monta o HTML da tarefa
                    let tarefaHTML = `
                        <div class="tarefa ${tarefa.status}">
                            <p>${tarefa.nome}</p>
                            <p>${tarefa.disciplina}</p>
                            <p>${dataFormatada}</p>

                            <div class="acoes">
                                <button onclick="toggleStatus(${tarefa.idTarefa}, '${tarefa.status}')">
                                    ${acao}
                                </button>

                                <button onclick="deletarTarefa(${tarefa.idTarefa})">🗑️</button>
                            </div>
                        </div>
                    `;
                    
                    // Adiciona a tarefa na lista geral
                    divTodas.innerHTML += tarefaHTML;
                    
                     // Se a tarefa for de hoje, adiciona também na lista "Hoje"
                    if (dataFormatada === hoje) {
                        divHoje.innerHTML += tarefaHTML;
                    }
                });
            })
            .catch(erro => {

                // Captura e exibe erros no console
                console.error("Erro ao carregar tarefas:", erro);
            });
}

    // Função responsável por alternar (trocar) o status de uma tarefa
    function toggleStatus(id, statusAtual) {

        // Variável que armazenará o novo status da tarefa
        let novoStatus;

        // Define o próximo status com base no status atual
        if (statusAtual === "pendente") {
            novoStatus = "andamento";  // começa a tarefa
        } else if (statusAtual === "andamento") {
            novoStatus = "concluido"; // finaliza a tarefa
        } else {
            novoStatus = "pendente"; // reinicia a tarefa
        }

        // Envia uma requisição para o backend para atualizar o status
        fetch("/tarefas/status", {
            method: "PUT", // método HTTP para atualização
            headers: {
                "Content-Type": "application/json"  // informa que está enviando JSON
            },
            body: JSON.stringify({
                idTarefa: id, // ID da tarefa que será atualizada
                status: novoStatus // novo status definido acima
            })
        })
        .then(res => res.text()) // recebe a resposta do servidor
        .then(() => {

            // espera um micro delay pra garantir update no banco
            setTimeout(() => {

                // Recarrega os dados da interface após a atualização
                carregarTarefas();
                carregarCards();
                carregarGraficoSemana();
                carregarGraficoMes();

            }, 100);

        });
    }   

    // Função responsável por abrir o modal de criação de tarefa
    function abrirModal() {

        // Seleciona o elemento do modal pelo ID
        // e altera o display para "flex", tornando-o visível na tela
        document.getElementById("modalTarefa").style.display = "flex";

        // Obtém a data atual no formato ISO (YYYY-MM-DDTHH:mm:ss)
        // e separa apenas a parte da data (antes do "T")
        let hoje = new Date().toISOString().split("T")[0];

        // Define a data atual como valor padrão no input de data
        document.getElementById("inputData").value = hoje;
    }

    // Função responsável por fechar o modal de tarefa
    function fecharModal() {

        // Seleciona o elemento do modal pelo ID
        // e altera o display para "none", escondendo-o da tela
        document.getElementById("modalTarefa").style.display = "none";
    }
    
    // Função responsável por coletar os dados do formulário e enviar uma nova tarefa para o backend
    function salvarTarefa() {

        // Captura os valores digitados nos inputs
        let nome = document.getElementById("inputNome").value;
        let disciplina = document.getElementById("inputDisciplina").value;
        let data = document.getElementById("inputData").value;

        // Recupera o ID do usuário armazenado na sessão
        let fkUsuario = sessionStorage.getItem("ID_USUARIO");

         // Validação simples: verifica se os campos obrigatórios foram preenchidos
        if (!nome || !data) {
            alert("Preencha os campos!");
            return;
        }

        // Envia os dados para o backend via requisição HTTP (POST)
        fetch("/tarefas/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json" // informa que o corpo é JSON
            },
            body: JSON.stringify({
                nome: nome,
                disciplina: disciplina,
                data: data,
                fkUsuario: fkUsuario
            })
        })
        .then(async res => {

            // Lê a resposta do servidor como texto
            let texto = await res.text();

            // Exibe a resposta no console (debug)
            console.log("RESPOSTA DO SERVIDOR:", texto);

            // Se a resposta não for OK, lança um erro
            if (!res.ok) {
                throw new Error(texto);
            }
        })
        .then(() => {

            // Se deu tudo certo: fecha o modal e atualiza os dados da tela
            fecharModal();
            carregarTarefas();
            carregarCards();
        })
        .catch(erro => {

            // Captura e exibe erros no console
            console.error("Erro:", erro);
        });
    }

    // Função responsável por deletar uma tarefa
    function deletarTarefa(id) {

        // Envia uma requisição para o backend informando qual tarefa deve ser removida
        fetch("/tarefas/deletar", {
            method: "DELETE",  // geralmente usado para atualização (pode ser exclusão lógica)
            headers: {
                "Content-Type": "application/json" // indica que está enviando JSON
            },
            body: JSON.stringify({ idTarefa: id }) // ID da tarefa que será deletada
        })
        .then(res => res.text()) // recebe a resposta do servidor
        .then(() => {

            // Após deletar, atualiza os dados na tela
            carregarTarefas();
            carregarCards();
            carregarGraficoSemana();
            carregarGraficoMes();
        });
    }

    // Função responsável por buscar e atualizar os cards (quantidade por status)
    async function carregarCards() {
        try {

            // Recupera o ID do usuário armazenado na sessão
            let fkUsuario = sessionStorage.getItem("ID_USUARIO");

            // Faz a requisição ao backend para obter a contagem de tarefas por status
            const resposta = await fetch(`/tarefas/contagem/${fkUsuario}`);

            // Verifica se a resposta foi bem-sucedida
            if (!resposta.ok) throw new Error("Contagem falhou");

            // Converte a resposta para JSON
            const dados = await resposta.json();

            // Exibe os dados no console (debug)
            console.log("CONTAGEM:", dados);

            // Inicializa os contadores
            let pendente = 0;
            let andamento = 0;
            let concluido = 0;

            // Percorre os dados retornados (cada item representa um status)
            dados.forEach(item => {

                // Normaliza o status (evita erro com maiúsculas/minúsculas)
                const status = (item.status || "").toLowerCase();

                // Atribui o total correspondente a cada status
                if (status === "pendente") pendente = item.total;
                if (status === "andamento") andamento = item.total;
                if (status === "concluido") concluido = item.total;
            });

            // Atualiza os elementos da tela com os valores obtidos
            document.getElementById("pendentesQtd").innerText = pendente;
            document.getElementById("andamentoQtd").innerText = andamento;
            document.getElementById("concluidasQtd").innerText = concluido;

        } catch (err) {

            // Caso ocorra erro, exibe no console
            console.log("Cards erro:", err);

            // Define os valores como 0 para evitar quebrar a interface
            document.getElementById("pendentesQtd").innerText = 0;
            document.getElementById("andamentoQtd").innerText = 0;
            document.getElementById("concluidasQtd").innerText = 0;
        }
    }

    // Função responsável por carregar e renderizar o gráfico de tarefas da semana
    function carregarGraficoSemana() {

        // Recupera o ID do usuário da sessão
        let fkUsuario = sessionStorage.getItem("ID_USUARIO");

        // let graficoSemana = null;

        // Faz a requisição ao backend para buscar os dados da semana
        fetch(`/tarefas/semana/${fkUsuario}`)
            .then(res => {

                 // Verifica se a resposta foi bem-sucedida
                if (!res.ok) throw new Error("Erro ao buscar dados semanais");

                // Converte a resposta para JSON
                return res.json();
            })
            .then(dados => {

                // Array com os nomes dos dias da semana (ordem fixa)
                const nomesDias = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];

                // Objeto base com valores zerados (garante que todos os dias existam)
                let valores = {
                    "Dom": 0,
                    "Seg": 0,
                    "Ter": 0,
                    "Qua": 0,
                    "Qui": 0,
                    "Sex": 0,
                    "Sáb": 0
                };

                // Preenche os valores com os dados vindos do backend
                dados.forEach(item => {

                    // item.diaSemana -> nome do dia (ex: "Seg") item.total -> quantidade de tarefas
                    valores[item.diaSemana] = item.total;
                });

                // Garante a ordem correta dos dados conforme o array de dias
                let dadosOrdenados = nomesDias.map(dia => valores[dia]);

                // Se já existir um gráfico anterior, destrói antes de criar outro(evita erro e sobreposição)
                if (window.graficoSemana?.destroy) {
                    window.graficoSemana.destroy();
                }

                // Obtém o contexto do canvas onde o gráfico será renderizado
                const ctx = document.getElementById("graficoSemana").getContext("2d");

                // Cria um novo gráfico utilizando Chart.js
                window.graficoSemana = new Chart(ctx, {
                    type: "bar",
                    data: {
                        labels: nomesDias, // rótulos (dias da semana)
                        datasets: [{
                            label: "Tarefas Concluídas", // legenda
                            data: dadosOrdenados, // valores
                            backgroundColor: "#C5E3FF" // cor das barras
                        }]
                    },
                });
            })
            .catch(err => {

                // Exibe erro no console caso a requisição falhe
                console.error(err);
            });
    }

    // Armazena a instância do gráfico mensal
    let graficoMes = null;

    // Função responsável por carregar e renderizar o gráfico mensal
    function carregarGraficoMes() {

        // Recupera o ID do usuário da sessão
        let fkUsuario = sessionStorage.getItem("ID_USUARIO");

        // Faz a requisição ao backend para buscar os dados do mês
        fetch(`/tarefas/mes/${fkUsuario}`)
            .then(res => res.json()) // converte a resposta para JSON
            .then(dados => {

                // Garante que os dados são um array (evita erro)
                const lista = Array.isArray(dados) ? dados : [];

                // Extrai os meses (labels do gráfico)
                const labels = lista.map(i => i.mes);

                // Extrai os valores (quantidade de tarefas)
                const valores = lista.map(i => i.total);

                // Se já existir um gráfico, destrói antes de criar outro
                if (graficoMes) {
                    graficoMes.destroy();
                }

                // Cria o gráfico com Chart.js
                graficoMes = new Chart(document.getElementById("graficoMes"), {
                    type: "bar",
                    data: {
                        labels, // meses
                        datasets: [{
                            label: "Tarefas Concluídas",
                            data: valores, // valores por mês
                            backgroundColor: "#D3EBC5"
                        }]
                    }
                });
            });
    }      

</script>
