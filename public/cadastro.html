<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow - Cadastro</title>
    <link rel="stylesheet" href="/css/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="shortcut icon" href="../assets/icon/favicon.svg" type="image/x-icon">
</head>

<body onload="listar()">
  <!--header inicio-->
    <header>
        <div class="logo">
            <img src="../assets/icon/studyflow.svg" alt="Logo">
            <h2>StudyFlow</h2>
        </div>
        <div class="nav">
            <button>
                <i class="bi bi-arrow-left"></i>
                <a href="index.html">Voltar</a>
            </button>
        </div>
    </header>

  <!--header fim-->

    <div class="login">
        <div class="container">
        <div class="card card-cadastro">
            <h2>Crie a sua conta!</h2>
            <div class="formulario">
            <div class="campo">
                <p>Nome:</p>
                <input id="nome_input" type="text" placeholder="Seu nome" />
            </div>
            <div class="campo">
                <p>E-mail:</p>
                <input id="email_input" type="text" placeholder="meuemail@gmail.com" />
            </div>
            <div class="campo">
                <p>Senha:</p>
                <input id="senha_input" type="password" placeholder="******" />
            </div>
            <div class="campo">
                <p>Confirmação da Senha:</p>
                <input id="confirmacao_senha_input" type="password" placeholder="******" />
            </div>

            <p class="subtext">Já tem uma conta? <span><a href="login.html">Faça Login</a></span></p>

            <div class="alerta_erro">
                <span id="mensagem_erro"></span>
                </div>
                
                <button class="botao" onclick="cadastrar()">Cadastrar</button>
            </div>

            </div>
        </div>
        </div>
    </div>
</body>

</html>

<script>
function cadastrar() {

    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;

    cardErro.style.display = "none";

    // Validando se os campos estão todos preenchidos
    if (nomeVar == "" || emailVar == "" || senhaVar == "" || confirmacaoSenhaVar == "") {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "Preencha todos os campos!";
        return;
    }

    // Validando se o nome tem 2 caracteres ou mais
    if (nomeVar.length < 2) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "Nome inválido!";
        return;
    }

    // Validando se o email possui @ e .
    if (!emailVar.includes("@") || !emailVar.includes(".")) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "Email inválido! (Deve conter '@' e '.')";
        return;
    }

    // Validando se a senha do usuário possui 6 caracteres ou mais
    if (senhaVar.length < 6) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "Senha deve ter pelo menos 6 caracteres!";
        return;
    }

    // Validando se as senhas inseridas pelo usuário são iguais
    if (senhaVar != confirmacaoSenhaVar) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "As senhas não coincidem!";
        return;
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({
            nomeServer: nomeVar,
            emailServer: emailVar,
            senhaServer: senhaVar
        }),
    })
    .then(res => {
        if (!res.ok) {
            throw new Error("Erro ao cadastrar usuário");
        }
        return res.json();
    })
    .then(() => {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "Cadastro realizado! Redirecionando...";
        mensagem_erro.style.color = "green";
        setTimeout(() => {
            window.location = "login.html";
        }, 2000);
    })
    .catch(err => {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = err.message;
    });
}
</script>
