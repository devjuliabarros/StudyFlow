<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow - Login</title>
    <link rel="stylesheet" href="/css/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="shortcut icon" href="../assets/icon/favicon.svg" type="image/x-icon">
</head>

<body>
    <header>
        <div class="logo">
            <img src="../assets/icon/studyflow.svg" alt="Logo">
            <h2>StudyFlow</h2>
        </div>
        <div class="nav">
            <button>
                <i class="bi bi-arrow-left"></i>
                <a href="index.html">Voltar</a>
            </button>
        </div>
    </header>

    <div class="login">
        <div class="container">
            <div class="card-login">
                <h2>Bem vindo(a) de volta!</h2>
                <div class="formulario">
                    <div class="campo">
                        <p>E-mail:</p>
                        <input id="email_input" type="text" placeholder="Login">
                    </div>
                    <div class="campo">
                        <p>Senha:</p>
                        <input id="senha_input" type="password" placeholder="******">
                    </div>

                    <p class="subtext">Ainda não tem uma conta? <span><a href="cadastro.html">Crie uma</a></span></p>

                     <div class="card_erro" id="cardErro">
                        <span id="mensagem_erro"></span>
                    </div>

                    <button onclick="entrar()">Entrar</button>
                    
                    <div id="div_erros_login"></div>
                    <div class="alerta_erro"></div>

                </div>
            </div>
        </div>
    </div>
</body>

</html>

<script>
function entrar() {

    var emailVar = document.getElementById("email_input").value;
    var senhaVar = document.getElementById("senha_input").value;

    if (emailVar == "" || senhaVar == "") {
        document.getElementById("cardErro").style.display = "block";
        document.getElementById("mensagem_erro").innerHTML = "Preencha todos os campos!";
        return;
    }

    fetch("/usuarios/autenticar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            emailServer: emailVar,
            senhaServer: senhaVar
        })
    })
    .then(res => {
        if (!res.ok) {
            throw new Error("Email ou senha inválidos");
        }
        return res.json();
    })
    .then(json => {
        console.log("Login OK:", json);

        // ⚠️ confere o nome das propriedades que o backend retorna
        sessionStorage.ID_USUARIO = json.idUsuario;
        sessionStorage.NOME_USUARIO = json.nome;
        sessionStorage.EMAIL_USUARIO = json.email;

        // redireciona
        window.location.href = "/index.html";
    })
    .catch(err => {
        console.log(err);

        document.getElementById("cardErro").style.display = "block";
        document.getElementById("mensagem_erro").innerHTML = err.message;
    });
}
</script>
